    function gerarDanfse() {
        var url = $('#url').val();
        if ($('#cancelada').is(':checked')) {
            url += '?situacao=CANCELADA';
        }
        $('#log').text('Chamando ' + url + ' ...');

        $.ajax({
            url: url,
            type: 'POST',
            contentType: 'application/xml',
            data: xmlNfse,
            success: function (result) {
                $('#log').text(
                    'success:     ' + result.success +
                    '\nnumeroNfse:  ' + result.numeroNfse +
                    '\nchaveAcesso: ' + result.chaveAcesso +
                    '\nemitente:    ' + result.emitente +
                    '\nsituacao:    ' + result.situacao +
                    '\nfileName:    ' + result.fileName +
                    '\npdfBase64:   ' + result.pdfBase64.substring(0, 60) + '... (' + result.pdfBase64.length + ' chars)'
                );

                // converte base64 -> blob e abre o PDF em nova aba
                var byteChars = atob(result.pdfBase64);
                var bytes = new Uint8Array(byteChars.length);
                for (var i = 0; i < byteChars.length; i++) {
                    bytes[i] = byteChars.charCodeAt(i);
                }
                var blob = new Blob([bytes], { type: 'application/pdf' });
                window.open(URL.createObjectURL(blob), '_blank');
            },
            error: function (xhr) {
                var msg = (xhr.responseJSON && xhr.responseJSON.message) || xhr.statusText;
                $('#log').text('ERRO ' + xhr.status + ': ' + msg);
            }
        });
    }
    </script>
